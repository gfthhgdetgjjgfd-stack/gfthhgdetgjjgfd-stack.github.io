<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Музыка - группа 5201ФК</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif; min-height: 100vh; color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .subtitle { text-align: center; margin-bottom: 30px; opacity: 0.9; }

        #adminPanel {
            display: none;
            background: rgba(0,0,0,0.3);
            padding: 20px; border-radius: 10px; margin-bottom: 20px;
            flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center;
        }
        .controls {
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px;
            margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px;
            align-items: center; justify-content: center;
        }
        .upload-btn, .save-token-btn, .admin-btn {
            background: #4CAF50; color: white; padding: 12px 24px; border: none;
            border-radius: 5px; cursor: pointer; font-size: 1.1em; transition: background 0.3s;
        }
        .upload-btn:hover, .save-token-btn:hover, .admin-btn:hover { background: #45a049; }
        .clear-btn {
            background: #f44336; color: white; padding: 12px 24px; border: none;
            border-radius: 5px; cursor: pointer; font-size: 1.1em; transition: background 0.3s;
        }
        .clear-btn:hover { background: #da190b; }
        .token-input { padding: 10px; border-radius: 5px; border: none; width: 300px; font-size: 0.9em; }
        #fileInput { display: none; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .audio-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.3s, background 0.3s;
        }
        .audio-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
        }
        .audio-card.playing {
            background: rgba(76, 175, 80, 0.3);
            border: 2px solid #4CAF50;
        }
        .audio-icon {
            font-size: 3em;
            text-align: center;
            margin-bottom: 10px;
        }
        .audio-name {
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .audio-size {
            text-align: center;
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 15px;
        }
        .audio-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }
        .play-btn {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5em;
            cursor: pointer;
            transition: background 0.3s;
        }
        .play-btn:hover { background: #45a049; }
        .play-btn.playing { background: #ff9800; }
        .play-btn.playing:hover { background: #f57c00; }

        .delete-btn {
            background: #f44336; color: white; border: none;
            border-radius: 5px; padding: 8px 16px; cursor: pointer;
            font-size: 0.9em; margin-top: 10px; width: 100%;
        }
        .delete-btn:hover { background: #da190b; }
        .uploading { opacity: 0.6; pointer-events: none; }

        .empty-state {
            text-align: center; padding: 60px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            grid-column: 1 / -1;
        }
        .empty-state .icon { font-size: 4em; margin-bottom: 20px; }
        .status {
            text-align: center; padding: 10px; margin: 10px 0;
            border-radius: 5px; font-weight: bold;
        }
        .status.success { background: rgba(76, 175, 80, 0.3); }
        .status.error { background: rgba(244, 67, 54, 0.3); }
        .status.info { background: rgba(33, 150, 243, 0.3); }

        .back-link {
            display: block; text-align: center; margin-top: 30px;
            color: white; text-decoration: none; font-size: 1.1em;
        }
        .back-link:hover { text-decoration: underline; }
        .warning {
            background: rgba(255, 152, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9em;
        }

        /* Прогресс-бар */
        .progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin: 10px 0;
            cursor: pointer;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.1s;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Музыка</h1>
        <p class="subtitle">Аудиофайлы из репозитория GitHub</p>

        <div class="warning">
            ⚠️ <strong>Важно:</strong> Максимальный размер файла — 100 МБ.
            Поддерживаемые форматы: MP3, WAV, OGG, FLAC, AAC, M4A.
        </div>

        <div style="text-align: center; margin-bottom: 10px;">
            <button class="admin-btn" onclick="toggleAdmin()" style="background: #555; font-size: 0.9em; padding: 8px 15px;">🔒 Админ</button>
        </div>

        <div id="adminPanel">
            <input type="password" class="token-input" id="tokenInput" placeholder="GitHub Token">
            <button class="save-token-btn" onclick="saveToken()">💾 Войти</button>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()" id="uploadBtn">📤 Загрузить</button>
            <input type="file" id="fileInput" accept="audio/*" multiple onchange="handleFiles(this.files)">
            <button class="clear-btn" onclick="clearAll()">🗑️ Удалить все</button>
        </div>

        <div id="status"></div>
        <div class="gallery" id="gallery"></div>

        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
        const GITHUB_USERNAME = 'gfthhgdetgjjgfd-stack';
        const REPO_NAME = 'gfthhgdetgjjgfd-stack.github.io';
        const AUDIO_FOLDER = 'audio';
        const TOKEN_STORAGE_KEY = 'github_token_5201';
        const MAX_FILE_SIZE = 100 * 1024 * 1024; // 100 МБ

        let githubToken = localStorage.getItem(TOKEN_STORAGE_KEY) || '';
        let audioFiles = [];
        let currentAudio = null;
        let currentCard = null;

        window.onload = function() {
            if (githubToken) {
                document.getElementById('tokenInput').value = githubToken;
                document.getElementById('adminPanel').style.display = 'flex';
            }
            loadAudioFromRepo();
        };

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            if (panel.style.display === 'flex') {
                panel.style.display = 'none';
            } else {
                if (!githubToken) {
                    const token = prompt("Введите токен администратора:");
                    if (token) {
                        githubToken = token;
                        localStorage.setItem(TOKEN_STORAGE_KEY, token);
                        document.getElementById('tokenInput').value = token;
                    } else {
                        return;
                    }
                }
                panel.style.display = 'flex';
            }
        }

        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { showStatus('Введите токен!', 'error'); return; }
            githubToken = token;
            localStorage.setItem(TOKEN_STORAGE_KEY, token);
            showStatus('Вы вошли как администратор!', 'success');
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + type;
            statusEl.textContent = message;
            setTimeout(() => { statusEl.textContent = ''; }, 4000);
        }

        // ЧТЕНИЕ СПИСКА АУДИО (БЕЗ ТОКЕНА)
        async function loadAudioFromRepo() {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${AUDIO_FOLDER}`
                );

                if (response.status === 404) {
                    audioFiles = [];
                    renderGallery();
                    return;
                }
                if (!response.ok) throw new Error('Ошибка: ' + response.status);

                const files = await response.json();
                audioFiles = files.filter(file =>
                    file.type === 'file' && /\.(mp3|wav|ogg|flac|aac|m4a|wma)$/i.test(file.name)
                ).map(file => ({
                    name: file.name,
                    download_url: file.download_url,
                    sha: file.sha,
                    path: file.path,
                    size: file.size
                }));

                renderGallery();
            } catch (error) {
                console.error('Error:', error);
                showStatus('Ошибка загрузки аудио', 'error');
            }
        }

        // ЗАГРУЗКА АУДИО
        async function handleFiles(files) {
            if (!githubToken) { showStatus('Сначала войдите как админ!', 'error'); return; }
            if (!files || files.length === 0) return;

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.classList.add('uploading');

            for (let file of files) {
                if (file.size > MAX_FILE_SIZE) {
                    showStatus(`❌ ${file.name} слишком большой (${(file.size/1024/1024).toFixed(1)} МБ). Максимум 100 МБ.`, 'error');
                    continue;
                }
                await uploadFileToGitHub(file);
            }
            uploadBtn.classList.remove('uploading');
            document.getElementById('fileInput').value = '';
        }

        async function uploadFileToGitHub(file) {
            try {
                showStatus(`Загрузка ${file.name} (${(file.size/1024/1024).toFixed(1)} МБ)...`, 'info');

                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });

                const filePath = `${AUDIO_FOLDER}/${file.name}`;
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${filePath}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload audio: ${file.name}`,
                            content: base64,
                            branch: 'main'
                        })
                    }
                );

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message);
                }
                showStatus(`✅ ${file.name} загружен!`, 'success');
                await loadAudioFromRepo();
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            }
        }

        // УДАЛЕНИЕ АУДИО
        async function deleteAudio(audio) {
            if (!githubToken) { showStatus('Войдите как администратор!', 'error'); return; }
            if (!confirm(`Удалить "${audio.name}"?`)) return;

            try {
                showStatus(`Удаление ${audio.name}...`, 'info');
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${audio.path}`,
                    { headers: { 'Authorization': `token ${githubToken}` } }
                );
                const fileData = await response.json();

                const deleteResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${audio.path}`,
                    {
                        method: 'DELETE',
                        headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Delete: ${audio.name}`, sha: fileData.sha, branch: 'main' })
                    }
                );

                if (!deleteResponse.ok) throw new Error('Ошибка удаления');
                showStatus(`✅ Удалено`, 'success');
                await loadAudioFromRepo();
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            }
        }

        async function clearAll() {
            if (!githubToken) { showStatus('Войдите как администратор!', 'error'); return; }
            if (audioFiles.length === 0) return;
            if (!confirm(`Удалить ВСЕ аудио (${audioFiles.length} шт.)?`)) return;

            for (let audio of audioFiles) {
                await deleteAudio(audio);
            }
        }

        // Воспроизведение
        function togglePlay(audio, cardElement) {
            if (currentAudio && currentAudio !== audio) {
                currentAudio.pause();
                if (currentCard) currentCard.classList.remove('playing');
            }

            if (audio.paused) {
                audio.play();
                cardElement.classList.add('playing');
                currentAudio = audio;
                currentCard = cardElement;
            } else {
                audio.pause();
                cardElement.classList.remove('playing');
                currentAudio = null;
                currentCard = null;
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            if (audioFiles.length === 0) {
                gallery.innerHTML = `<div class="empty-state"><div class="icon">🎵</div><h2>Пока нет музыки</h2><p>Загрузите первый аудиофайл</p></div>`;
                return;
            }
            gallery.innerHTML = audioFiles.map((audio, index) => `
                <div class="audio-card" id="card-${index}">
                    <div class="audio-icon">🎵</div>
                    <div class="audio-name" title="${audio.name}">${audio.name}</div>
                    <div class="audio-size">${(audio.size/1024/1024).toFixed(1)} МБ</div>

                    <div class="progress-container" onclick="seekAudio(event, ${index})">
                        <div class="progress-bar" id="progress-${index}"></div>
                    </div>
                    <div class="time-display">
                        <span id="current-${index}">0:00</span>
                        <span id="duration-${index}">0:00</span>
                    </div>

                    <div class="audio-controls">
                        <button class="play-btn" id="playBtn-${index}" onclick="togglePlay(document.getElementById('audio-${index}'), document.getElementById('card-${index}'))">▶</button>
                    </div>

                    <audio id="audio-${index}" src="${audio.download_url}"
                           ontimeupdate="updateProgress(${index})"
                           onloadedmetadata="updateDuration(${index})"
                           onended="audioEnded(${index})"></audio>

                    <button class="delete-btn" onclick="deleteAudio(${JSON.stringify(audio).replace(/"/g, '&quot;')})">🗑️ Удалить</button>
                </div>
            `).join('');
        }

        function updateProgress(index) {
            const audio = document.getElementById(`audio-${index}`);
            const progress = document.getElementById(`progress-${index}`);
            const current = document.getElementById(`current-${index}`);

            const percent = (audio.currentTime / audio.duration) * 100;
            progress.style.width = percent + '%';
            current.textContent = formatTime(audio.currentTime);
        }

        function updateDuration(index) {
            const audio = document.getElementById(`audio-${index}`);
            const duration = document.getElementById(`duration-${index}`);
            duration.textContent = formatTime(audio.duration);
        }

        function seekAudio(event, index) {
            const audio = document.getElementById(`audio-${index}`);
            const progressContainer = event.currentTarget;
            const rect = progressContainer.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function audioEnded(index) {
            const card = document.getElementById(`card-${index}`);
            const playBtn = document.getElementById(`playBtn-${index}`);
            card.classList.remove('playing');
            playBtn.textContent = '▶';
            currentAudio = null;
            currentCard = null;
        }

        // Обновляем иконку кнопки при воспроизведении
        setInterval(() => {
            audioFiles.forEach((_, index) => {
                const audio = document.getElementById(`audio-${index}`);
                const playBtn = document.getElementById(`playBtn-${index}`);
                if (audio && !audio.paused) {
                    playBtn.textContent = '⏸';
                } else if (audio) {
                    playBtn.textContent = '▶';
                }
            });
        }, 100);
    </script>
</body>
</html>
