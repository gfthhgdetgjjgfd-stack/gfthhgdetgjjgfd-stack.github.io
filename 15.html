<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Видео - группа 5201ФК</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif; min-height: 100vh; color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .subtitle { text-align: center; margin-bottom: 30px; opacity: 0.9; }

        #adminPanel {
            display: none;
            background: rgba(0,0,0,0.3);
            padding: 20px; border-radius: 10px; margin-bottom: 20px;
            flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center;
        }
        .controls {
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px;
            margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px;
            align-items: center; justify-content: center;
        }
        .upload-btn, .save-token-btn, .admin-btn {
            background: #4CAF50; color: white; padding: 12px 24px; border: none;
            border-radius: 5px; cursor: pointer; font-size: 1.1em; transition: background 0.3s;
        }
        .upload-btn:hover, .save-token-btn:hover, .admin-btn:hover { background: #45a049; }
        .clear-btn {
            background: #f44336; color: white; padding: 12px 24px; border: none;
            border-radius: 5px; cursor: pointer; font-size: 1.1em; transition: background 0.3s;
        }
        .clear-btn:hover { background: #da190b; }
        .token-input { padding: 10px; border-radius: 5px; border: none; width: 300px; font-size: 0.9em; }
        #fileInput { display: none; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .video-card:hover { transform: translateY(-5px); }
        .video-card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #000;
            display: block;
        }
        .video-info {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .video-name {
            font-size: 0.9em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }
        .delete-btn {
            background: #f44336; color: white; border: none;
            border-radius: 5px; padding: 5px 12px; cursor: pointer; font-size: 0.9em;
        }
        .delete-btn:hover { background: #da190b; }
        .uploading { opacity: 0.6; pointer-events: none; }

        .empty-state {
            text-align: center; padding: 60px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            grid-column: 1 / -1;
        }
        .empty-state .icon { font-size: 4em; margin-bottom: 20px; }
        .status {
            text-align: center; padding: 10px; margin: 10px 0;
            border-radius: 5px; font-weight: bold;
        }
        .status.success { background: rgba(76, 175, 80, 0.3); }
        .status.error { background: rgba(244, 67, 54, 0.3); }
        .status.info { background: rgba(33, 150, 243, 0.3); }

        /* Модальное окно для просмотра на весь экран */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal video {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
        }
        .modal-close {
            position: absolute; top: 20px; right: 30px;
            color: white; font-size: 2.5em; cursor: pointer;
            background: none; border: none;
        }
        .modal-title {
            color: white;
            margin-top: 15px;
            font-size: 1.2em;
        }
        .back-link {
            display: block; text-align: center; margin-top: 30px;
            color: white; text-decoration: none; font-size: 1.1em;
        }
        .back-link:hover { text-decoration: underline; }
        .warning {
            background: rgba(255, 152, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Видео</h1>
        <p class="subtitle">Видео из репозитория GitHub</p>

        <div class="warning">
            ⚠️ <strong>Важно:</strong> Максимальный размер файла — 100 МБ (ограничение GitHub API).
            Рекомендуемые форматы: MP4, WebM, OGG.
        </div>

        <div style="text-align: center; margin-bottom: 10px;">
            <button class="admin-btn" onclick="toggleAdmin()" style="background: #555; font-size: 0.9em; padding: 8px 15px;">🔒 Админ</button>
        </div>

        <div id="adminPanel">
            <input type="password" class="token-input" id="tokenInput" placeholder="GitHub Token">
            <button class="save-token-btn" onclick="saveToken()">💾 Войти</button>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()" id="uploadBtn">📤 Загрузить</button>
            <input type="file" id="fileInput" accept="video/*" multiple onchange="handleFiles(this.files)">
            <button class="clear-btn" onclick="clearAll()">🗑️ Удалить все</button>
        </div>

        <div id="status"></div>
        <div class="gallery" id="gallery"></div>

        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <video id="modalVideo" controls></video>
        <div class="modal-title" id="modalTitle"></div>
    </div>

    <script>
        const GITHUB_USERNAME = 'gfthhgdetgjjgfd-stack';
        const REPO_NAME = 'gfthhgdetgjjgfd-stack.github.io';
        const VIDEOS_FOLDER = 'videos';
        const TOKEN_STORAGE_KEY = 'github_token_5201';
        const MAX_FILE_SIZE = 100 * 1024 * 1024; // 100 МБ

        let githubToken = localStorage.getItem(TOKEN_STORAGE_KEY) || '';
        let videos = [];

        window.onload = function() {
            if (githubToken) {
                document.getElementById('tokenInput').value = githubToken;
                document.getElementById('adminPanel').style.display = 'flex';
            }
            loadVideosFromRepo();
        };

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            if (panel.style.display === 'flex') {
                panel.style.display = 'none';
            } else {
                if (!githubToken) {
                    const token = prompt("Введите токен администратора:");
                    if (token) {
                        githubToken = token;
                        localStorage.setItem(TOKEN_STORAGE_KEY, token);
                        document.getElementById('tokenInput').value = token;
                    } else {
                        return;
                    }
                }
                panel.style.display = 'flex';
            }
        }

        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { showStatus('Введите токен!', 'error'); return; }
            githubToken = token;
            localStorage.setItem(TOKEN_STORAGE_KEY, token);
            showStatus('Вы вошли как администратор!', 'success');
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + type;
            statusEl.textContent = message;
            setTimeout(() => { statusEl.textContent = ''; }, 4000);
        }

        // ЧТЕНИЕ СПИСКА ВИДЕО (БЕЗ ТОКЕНА)
        async function loadVideosFromRepo() {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${VIDEOS_FOLDER}`
                );

                if (response.status === 404) {
                    videos = [];
                    renderGallery();
                    return;
                }
                if (!response.ok) throw new Error('Ошибка: ' + response.status);

                const files = await response.json();
                videos = files.filter(file =>
                    file.type === 'file' && /\.(mp4|webm|ogg|mov|avi|mkv)$/i.test(file.name)
                ).map(file => ({
                    name: file.name,
                    download_url: file.download_url,
                    sha: file.sha,
                    path: file.path,
                    size: file.size
                }));

                renderGallery();
            } catch (error) {
                console.error('Error:', error);
                showStatus('Ошибка загрузки видео', 'error');
            }
        }

        // ЗАГРУЗКА ВИДЕО
        async function handleFiles(files) {
            if (!githubToken) { showStatus('Сначала войдите как админ!', 'error'); return; }
            if (!files || files.length === 0) return;

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.classList.add('uploading');

            for (let file of files) {
                if (file.size > MAX_FILE_SIZE) {
                    showStatus(`❌ ${file.name} слишком большой (${(file.size/1024/1024).toFixed(1)} МБ). Максимум 100 МБ.`, 'error');
                    continue;
                }
                await uploadFileToGitHub(file);
            }
            uploadBtn.classList.remove('uploading');
            document.getElementById('fileInput').value = '';
        }

        async function uploadFileToGitHub(file) {
            try {
                showStatus(`Загрузка ${file.name} (${(file.size/1024/1024).toFixed(1)} МБ)...`, 'info');

                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });

                const filePath = `${VIDEOS_FOLDER}/${file.name}`;
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${filePath}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload video: ${file.name}`,
                            content: base64,
                            branch: 'main'
                        })
                    }
                );

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message);
                }
                showStatus(`✅ ${file.name} загружен!`, 'success');
                await loadVideosFromRepo();
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            }
        }

        // УДАЛЕНИЕ ВИДЕО
        async function deleteVideo(video) {
            if (!githubToken) { showStatus('Войдите как администратор!', 'error'); return; }
            if (!confirm(`Удалить "${video.name}"?`)) return;

            try {
                showStatus(`Удаление ${video.name}...`, 'info');
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${video.path}`,
                    { headers: { 'Authorization': `token ${githubToken}` } }
                );
                const fileData = await response.json();

                const deleteResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${video.path}`,
                    {
                        method: 'DELETE',
                        headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Delete: ${video.name}`, sha: fileData.sha, branch: 'main' })
                    }
                );

                if (!deleteResponse.ok) throw new Error('Ошибка удаления');
                showStatus(`✅ Удалено`, 'success');
                await loadVideosFromRepo();
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            }
        }

        async function clearAll() {
            if (!githubToken) { showStatus('Войдите как администратор!', 'error'); return; }
            if (videos.length === 0) return;
            if (!confirm(`Удалить ВСЕ видео (${videos.length} шт.)?`)) return;

            for (let video of videos) {
                await deleteVideo(video);
            }
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            if (videos.length === 0) {
                gallery.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><h2>Пока нет видео</h2><p>Загрузите первое видео</p></div>`;
                return;
            }
            gallery.innerHTML = videos.map(video => `
                <div class="video-card">
                    <video src="${video.download_url}" onclick="openModal('${video.download_url}', '${video.name.replace(/'/g, "\\'")}')" preload="metadata"></video>
                    <div class="video-info">
                        <span class="video-name" title="${video.name}">${video.name} (${(video.size/1024/1024).toFixed(1)} МБ)</span>
                        <button class="delete-btn" onclick="deleteVideo(${JSON.stringify(video).replace(/"/g, '&quot;')})">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(src, title) {
            const video = document.getElementById('modalVideo');
            video.src = src;
            video.play();
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            const video = document.getElementById('modalVideo');
            video.pause();
            video.src = '';
            document.getElementById('modal').classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
